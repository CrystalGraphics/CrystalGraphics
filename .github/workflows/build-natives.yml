name: Build Native Libraries (Manual)

on:
  workflow_dispatch:
    inputs:
      commit_natives:
        description: 'Commit built natives back to branch'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write

# Java 17 is used for ALL jobs because:
# 1. Temurin does NOT publish Java 8 for macOS ARM64 (Apple Silicon predates Java 8 EOL)
# 2. JNI headers (jni.h) are stable across Java versions — the native build only needs headers
# 3. The compiled .so/.dylib/.dll is Java-version-agnostic (loaded at runtime by any JVM)

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libfreetype6-dev libharfbuzz-dev
      - name: Build MSDFgen for Linux x64
        working-directory: msdfgen-java-bindings/native/msdfgen-jni
        run: |
          chmod +x build-natives.sh
          ./build-natives.sh
      - name: Build FreeType+HarfBuzz for Linux x64
        working-directory: freetype-harfbuzz-java-bindings/native/freetype-harfbuzz-jni
        run: |
          chmod +x build-natives.sh
          ./build-natives.sh
      - name: Verify shared libraries have no non-system dependencies
        run: |
          echo "=== Checking freetype_harfbuzz_jni.so ==="
          ldd freetype-harfbuzz-java-bindings/src/main/resources/natives/linux-x64/libfreetype_harfbuzz_jni.so
          echo ""
          echo "=== Checking msdfgen-jni.so ==="
          ldd msdfgen-java-bindings/src/main/resources/natives/linux-x64/libmsdfgen-jni.so
          echo ""
          echo "=== Verifying no non-system shared dependencies ==="
          # Allowed: linux-vdso, libm, libpthread, libdl, librt, libc, libgcc_s, libstdc++, ld-linux
          FAIL=0
          for lib in \
            freetype-harfbuzz-java-bindings/src/main/resources/natives/linux-x64/libfreetype_harfbuzz_jni.so \
            msdfgen-java-bindings/src/main/resources/natives/linux-x64/libmsdfgen-jni.so; do
            BAD_DEPS=$(ldd "$lib" 2>/dev/null | grep -vE '(linux-vdso|libm\.|libpthread\.|libdl\.|librt\.|libc\.|libgcc_s\.|libstdc\+\+\.|ld-linux|not a dynamic)' || true)
            if [ -n "$BAD_DEPS" ]; then
              echo "FAIL: $lib has non-system dependencies:"
              echo "$BAD_DEPS"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "PASS: All shared libraries only depend on system libraries"
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: natives-linux-x64
          path: '**/src/main/resources/natives/linux-x64/'

  build-macos-intel:
    # macos-13 was retired Dec 2025. macos-15 is Intel-compatible via Rosetta,
    # but for true x64 native builds we use macos-15 with explicit x86_64 arch.
    # The build scripts already set CMAKE_OSX_ARCHITECTURES=x86_64 for Intel.
    runs-on: macos-15
    env:
      # Force x86_64 cross-compilation on ARM64 runner
      MACOS_TARGET_ARCH: x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install dependencies
        run: brew install cmake freetype harfbuzz
      - name: Build MSDFgen for macOS x64
        working-directory: msdfgen-java-bindings/native/msdfgen-jni
        run: |
          chmod +x build-natives.sh
          ./build-natives.sh
      - name: Build FreeType+HarfBuzz for macOS x64
        working-directory: freetype-harfbuzz-java-bindings/native/freetype-harfbuzz-jni
        run: |
          chmod +x build-natives.sh
          ./build-natives.sh
      - name: Verify dylibs have no non-system dependencies
        run: |
          echo "=== Checking freetype_harfbuzz_jni.dylib ==="
          otool -L freetype-harfbuzz-java-bindings/src/main/resources/natives/macos-x64/libfreetype_harfbuzz_jni.dylib
          echo ""
          echo "=== Checking msdfgen-jni.dylib ==="
          otool -L msdfgen-java-bindings/src/main/resources/natives/macos-x64/libmsdfgen-jni.dylib
          echo ""
          echo "=== Verifying only system frameworks ==="
          # Allowed: /usr/lib/*, /System/Library/*, @rpath/*, @loader_path/*
          FAIL=0
          for lib in \
            freetype-harfbuzz-java-bindings/src/main/resources/natives/macos-x64/libfreetype_harfbuzz_jni.dylib \
            msdfgen-java-bindings/src/main/resources/natives/macos-x64/libmsdfgen-jni.dylib; do
            BAD_DEPS=$(otool -L "$lib" | tail -n +2 | grep -vE '(/usr/lib/|/System/Library/|@rpath/|@loader_path/|@executable_path/)' || true)
            if [ -n "$BAD_DEPS" ]; then
              echo "FAIL: $lib has non-system dependencies:"
              echo "$BAD_DEPS"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "PASS: All dylibs only depend on system frameworks"
      - name: Upload macOS Intel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: natives-macos-x64
          path: '**/src/main/resources/natives/macos-x64/'

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install dependencies
        run: brew install cmake freetype harfbuzz
      - name: Build MSDFgen for macOS ARM64
        working-directory: msdfgen-java-bindings/native/msdfgen-jni
        run: |
          chmod +x build-natives.sh
          ./build-natives.sh
      - name: Build FreeType+HarfBuzz for macOS ARM64
        working-directory: freetype-harfbuzz-java-bindings/native/freetype-harfbuzz-jni
        run: |
          chmod +x build-natives.sh
          ./build-natives.sh
      - name: Verify dylibs have no non-system dependencies
        run: |
          echo "=== Checking freetype_harfbuzz_jni.dylib ==="
          otool -L freetype-harfbuzz-java-bindings/src/main/resources/natives/macos-aarch64/libfreetype_harfbuzz_jni.dylib
          echo ""
          echo "=== Checking msdfgen-jni.dylib ==="
          otool -L msdfgen-java-bindings/src/main/resources/natives/macos-aarch64/libmsdfgen-jni.dylib
          echo ""
          echo "=== Verifying only system frameworks ==="
          FAIL=0
          for lib in \
            freetype-harfbuzz-java-bindings/src/main/resources/natives/macos-aarch64/libfreetype_harfbuzz_jni.dylib \
            msdfgen-java-bindings/src/main/resources/natives/macos-aarch64/libmsdfgen-jni.dylib; do
            BAD_DEPS=$(otool -L "$lib" | tail -n +2 | grep -vE '(/usr/lib/|/System/Library/|@rpath/|@loader_path/|@executable_path/)' || true)
            if [ -n "$BAD_DEPS" ]; then
              echo "FAIL: $lib has non-system dependencies:"
              echo "$BAD_DEPS"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "PASS: All dylibs only depend on system frameworks"
      - name: Upload macOS ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: natives-macos-aarch64
          path: '**/src/main/resources/natives/macos-aarch64/'

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Verify CMake available
        run: cmake --version
      - name: Setup Visual Studio environment
        uses: ilammy/msvc-dev-cmd@v1
      - name: Cache MSDFgen clone
        uses: actions/cache@v4
        with:
          path: |
            msdfgen-java-bindings/native/msdfgen-jni/msdfgen
          key: windows-msdfgen-v1.13
      - name: Cache FreeType+HarfBuzz dependencies
        uses: actions/cache@v4
        with:
          path: |
            freetype-harfbuzz-java-bindings/native/freetype-harfbuzz-jni/build/deps
          key: windows-ft-hb-deps-${{ hashFiles('freetype-harfbuzz-java-bindings/native/freetype-harfbuzz-jni/build-natives.bat') }}
          restore-keys: |
            windows-ft-hb-deps-
      - name: Build MSDFgen for Windows x64
        working-directory: msdfgen-java-bindings/native/msdfgen-jni
        shell: cmd
        run: call build-natives.bat
      - name: Build FreeType+HarfBuzz for Windows x64
        working-directory: freetype-harfbuzz-java-bindings/native/freetype-harfbuzz-jni
        shell: cmd
        run: call build-natives.bat
      - name: Verify DLLs have no non-system dependencies
        shell: cmd
        run: |
          echo === Checking freetype_harfbuzz_jni.dll dependencies ===
          dumpbin /dependents freetype-harfbuzz-java-bindings\src\main\resources\natives\windows-x64\freetype_harfbuzz_jni.dll || echo (dumpbin returned non-zero, continuing)
          echo.
          echo === Checking msdfgen-jni.dll dependencies ===
          dumpbin /dependents msdfgen-java-bindings\src\main\resources\natives\windows-x64\msdfgen-jni.dll || echo (dumpbin returned non-zero, continuing)
          echo.
          echo === Verifying no MinGW runtime DLLs ===
          set FAIL=0
          for %%f in (
            freetype-harfbuzz-java-bindings\src\main\resources\natives\windows-x64\freetype_harfbuzz_jni.dll
            msdfgen-java-bindings\src\main\resources\natives\windows-x64\msdfgen-jni.dll
          ) do (
            dumpbin /dependents "%%f" | findstr /i "libwinpthread libgcc libstdc++ VCRUNTIME MSVCP" >nul 2>&1
            if !errorlevel!==0 (
              echo FAIL: %%f has non-system runtime dependencies
              set FAIL=1
            ) else (
              echo PASS: %%f has no non-system runtime dependencies
            )
          )
          if %FAIL%==1 exit /b 1
          echo PASS: All DLLs only depend on system DLLs
      - name: Upload Windows x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: natives-windows-x64
          path: '**/src/main/resources/natives/windows-x64/'
          if-no-files-found: 'warn'

  commit-natives:
    needs: [build-linux, build-macos-intel, build-macos-arm, build-windows]
    if: github.event.inputs.commit_natives == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: natives-*
          merge-multiple: true

      - name: Verify downloaded natives
        run: |
          echo "=== Downloaded native files ==="
          find . -type f \( -name "*.dll" -o -name "*.so" -o -name "*.dylib" \) | sort
          echo ""
          echo "=== Directory structure ==="
          find . -path "*/natives/*" -type f | sort

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push natives
        run: |
          git add \
            msdfgen-java-bindings/src/main/resources/natives/ \
            freetype-harfbuzz-java-bindings/src/main/resources/natives/

          if git diff --cached --quiet; then
            echo "No native files changed — skipping commit."
          else
            echo "=== Changed native files ==="
            git diff --cached --name-only

            git commit -m "build(natives): Update platform binaries [skip ci]" \
              -m "Updated natives for: windows-x64, linux-x64, macos-x64, macos-aarch64" \
              -m "Triggered by: ${{ github.actor }} via workflow_dispatch"

            git push
            echo "Natives committed and pushed successfully."
          fi
