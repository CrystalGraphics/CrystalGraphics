name: Build Native Libraries

on:
  workflow_dispatch:
    inputs:
      commit_natives:
        description: 'Commit built natives back to the branch'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  push:
    paths:
      - 'msdfgen-java-bindings/native/**'
      - 'freetype-harfbuzz-java-bindings/native/**'
      - '.github/workflows/build-natives.yml'

permissions:
  contents: write

env:
  FREETYPE_VERSION: '2.13.2'
  HARFBUZZ_VERSION: '8.3.0'
  MSDFGEN_TAG: 'v1.13'

jobs:
  # ============================================================
  #  MSDFgen JNI — Native builds only (no cross-compilation)
  # ============================================================
  msdfgen-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential
      - name: Build MSDFgen JNI
        working-directory: msdfgen-java-bindings/native/msdfgen-jni
        run: |
          chmod +x build-natives.sh
          ./build-natives.sh
      - name: Verify output
        run: |
          ls -la msdfgen-java-bindings/src/main/resources/natives/linux-x64/
          file msdfgen-java-bindings/src/main/resources/natives/linux-x64/libmsdfgen-jni.so
      - uses: actions/upload-artifact@v4
        with:
          name: msdfgen-linux-x64
          path: msdfgen-java-bindings/src/main/resources/natives/linux-x64/

  msdfgen-macos-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
      - name: Install build tools
        run: brew install cmake
      - name: Build MSDFgen JNI
        working-directory: msdfgen-java-bindings/native/msdfgen-jni
        run: |
          chmod +x build-natives.sh
          ./build-natives.sh
      - name: Verify output
        run: |
          ls -la msdfgen-java-bindings/src/main/resources/natives/macos-x64/
          file msdfgen-java-bindings/src/main/resources/natives/macos-x64/libmsdfgen-jni.dylib
      - uses: actions/upload-artifact@v4
        with:
          name: msdfgen-macos-x64
          path: msdfgen-java-bindings/src/main/resources/natives/macos-x64/

  msdfgen-macos-aarch64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8'
      - name: Install build tools
        run: brew install cmake
      - name: Build MSDFgen JNI
        working-directory: msdfgen-java-bindings/native/msdfgen-jni
        run: |
          chmod +x build-natives.sh
          ./build-natives.sh
      - name: Verify output
        run: |
          ls -la msdfgen-java-bindings/src/main/resources/natives/macos-aarch64/
          file msdfgen-java-bindings/src/main/resources/natives/macos-aarch64/libmsdfgen-jni.dylib
      - uses: actions/upload-artifact@v4
        with:
          name: msdfgen-macos-aarch64
          path: msdfgen-java-bindings/src/main/resources/natives/macos-aarch64/

  msdfgen-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
      - name: Clone MSDFgen
        shell: bash
        working-directory: msdfgen-java-bindings/native/msdfgen-jni
        run: |
          if [ ! -d msdfgen ]; then
            git clone --depth 1 --branch ${{ env.MSDFGEN_TAG }} https://github.com/Chlumsky/msdfgen.git msdfgen
          fi
      - name: Build MSDFgen JNI (x64)
        shell: bash
        working-directory: msdfgen-java-bindings/native/msdfgen-jni
        run: |
          rm -rf build && mkdir -p build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release "-DMSDFGEN_SOURCE_DIR=$(pwd)/msdfgen"
          cmake --build build --config Release
          mkdir -p "../../src/main/resources/natives/windows-x64"
          cp build/Release/msdfgen-jni.dll "../../src/main/resources/natives/windows-x64/" 2>/dev/null || \
          cp build/msdfgen-jni.dll "../../src/main/resources/natives/windows-x64/"
      - name: Verify output
        shell: bash
        run: ls -la msdfgen-java-bindings/src/main/resources/natives/windows-x64/
      - uses: actions/upload-artifact@v4
        with:
          name: msdfgen-windows-x64
          path: msdfgen-java-bindings/src/main/resources/natives/windows-x64/

  msdfgen-windows-x86:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
          architecture: 'x86'
      - name: Clone MSDFgen
        shell: bash
        working-directory: msdfgen-java-bindings/native/msdfgen-jni
        run: |
          if [ ! -d msdfgen ]; then
            git clone --depth 1 --branch ${{ env.MSDFGEN_TAG }} https://github.com/Chlumsky/msdfgen.git msdfgen
          fi
      - name: Build MSDFgen JNI (x86)
        shell: bash
        working-directory: msdfgen-java-bindings/native/msdfgen-jni
        run: |
          rm -rf build && mkdir -p build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release "-DMSDFGEN_SOURCE_DIR=$(pwd)/msdfgen" -A Win32
          cmake --build build --config Release
          mkdir -p "../../src/main/resources/natives/windows-x86"
          cp build/Release/msdfgen-jni.dll "../../src/main/resources/natives/windows-x86/" 2>/dev/null || \
          cp build/msdfgen-jni.dll "../../src/main/resources/natives/windows-x86/"
      - name: Verify output
        shell: bash
        run: ls -la msdfgen-java-bindings/src/main/resources/natives/windows-x86/
      - uses: actions/upload-artifact@v4
        with:
          name: msdfgen-windows-x86
          path: msdfgen-java-bindings/src/main/resources/natives/windows-x86/

  # ============================================================
  #  FreeType + HarfBuzz JNI — Native builds only
  # ============================================================
  freetype-harfbuzz-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config curl xz-utils
      - name: Build FreeType+HarfBuzz JNI
        working-directory: freetype-harfbuzz-java-bindings/native/freetype-harfbuzz-jni
        run: |
          chmod +x build-natives.sh
          ./build-natives.sh
      - name: Verify output
        run: |
          ls -la freetype-harfbuzz-java-bindings/src/main/resources/natives/linux-x64/
          file freetype-harfbuzz-java-bindings/src/main/resources/natives/linux-x64/libfreetype_harfbuzz_jni.so
      - uses: actions/upload-artifact@v4
        with:
          name: freetype-harfbuzz-linux-x64
          path: freetype-harfbuzz-java-bindings/src/main/resources/natives/linux-x64/

  freetype-harfbuzz-macos-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
      - name: Install build tools
        run: brew install cmake pkg-config xz
      - name: Build FreeType+HarfBuzz JNI
        working-directory: freetype-harfbuzz-java-bindings/native/freetype-harfbuzz-jni
        run: |
          chmod +x build-natives.sh
          ./build-natives.sh
      - name: Verify output
        run: |
          ls -la freetype-harfbuzz-java-bindings/src/main/resources/natives/macos-x64/
          file freetype-harfbuzz-java-bindings/src/main/resources/natives/macos-x64/libfreetype_harfbuzz_jni.dylib
      - uses: actions/upload-artifact@v4
        with:
          name: freetype-harfbuzz-macos-x64
          path: freetype-harfbuzz-java-bindings/src/main/resources/natives/macos-x64/

  freetype-harfbuzz-macos-aarch64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8'
      - name: Install build tools
        run: brew install cmake pkg-config xz
      - name: Build FreeType+HarfBuzz JNI
        working-directory: freetype-harfbuzz-java-bindings/native/freetype-harfbuzz-jni
        run: |
          chmod +x build-natives.sh
          ./build-natives.sh
      - name: Verify output
        run: |
          ls -la freetype-harfbuzz-java-bindings/src/main/resources/natives/macos-aarch64/
          file freetype-harfbuzz-java-bindings/src/main/resources/natives/macos-aarch64/libfreetype_harfbuzz_jni.dylib
      - uses: actions/upload-artifact@v4
        with:
          name: freetype-harfbuzz-macos-aarch64
          path: freetype-harfbuzz-java-bindings/src/main/resources/natives/macos-aarch64/

  freetype-harfbuzz-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
      - name: Download and build dependencies
        shell: bash
        working-directory: freetype-harfbuzz-java-bindings/native/freetype-harfbuzz-jni
        run: |
          DEPS_DIR="$(pwd)/build/deps"
          mkdir -p "$DEPS_DIR"

          curl -L "https://download.savannah.gnu.org/releases/freetype/freetype-${FREETYPE_VERSION}.tar.xz" \
            -o "$DEPS_DIR/freetype.tar.xz"
          cd "$DEPS_DIR" && tar xf freetype.tar.xz && cd -

          curl -L "https://github.com/harfbuzz/harfbuzz/releases/download/${HARFBUZZ_VERSION}/harfbuzz-${HARFBUZZ_VERSION}.tar.xz" \
            -o "$DEPS_DIR/harfbuzz.tar.xz"
          cd "$DEPS_DIR" && tar xf harfbuzz.tar.xz && cd -

          FT_BUILD="$DEPS_DIR/freetype-build"
          mkdir -p "$FT_BUILD"
          cmake -S "$DEPS_DIR/freetype-${FREETYPE_VERSION}" -B "$FT_BUILD" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DBUILD_SHARED_LIBS=OFF \
            -DFT_DISABLE_BZIP2=ON \
            -DFT_DISABLE_PNG=ON \
            -DFT_DISABLE_HARFBUZZ=ON \
            -DFT_DISABLE_BROTLI=ON
          cmake --build "$FT_BUILD" --config Release

          FT_LIB=$(find "$FT_BUILD" -name "freetype.lib" -o -name "freetyped.lib" | head -1)
          echo "FreeType lib: $FT_LIB"

          HB_BUILD="$DEPS_DIR/harfbuzz-build"
          mkdir -p "$HB_BUILD"
          cmake -S "$DEPS_DIR/harfbuzz-${HARFBUZZ_VERSION}" -B "$HB_BUILD" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DBUILD_SHARED_LIBS=OFF \
            -DHB_HAVE_FREETYPE=ON \
            -DHB_HAVE_CORETEXT=OFF \
            -DHB_HAVE_GLIB=OFF \
            -DHB_HAVE_ICU=OFF \
            -DFREETYPE_INCLUDE_DIRS="$DEPS_DIR/freetype-${FREETYPE_VERSION}/include" \
            -DFREETYPE_LIBRARY="$FT_LIB"
          cmake --build "$HB_BUILD" --config Release

          HB_LIB=$(find "$HB_BUILD" -name "harfbuzz.lib" | head -1)
          echo "HarfBuzz lib: $HB_LIB"

          echo "FREETYPE_DIR=$DEPS_DIR/freetype-${FREETYPE_VERSION}" >> $GITHUB_ENV
          echo "FREETYPE_LIB=$FT_LIB" >> $GITHUB_ENV
          echo "HARFBUZZ_DIR=$DEPS_DIR/harfbuzz-${HARFBUZZ_VERSION}" >> $GITHUB_ENV
          echo "HARFBUZZ_LIB=$HB_LIB" >> $GITHUB_ENV

      - name: Build FreeType+HarfBuzz JNI (Windows x64)
        shell: bash
        working-directory: freetype-harfbuzz-java-bindings/native/freetype-harfbuzz-jni
        run: |
          JNI_BUILD="$(pwd)/build/jni-build"
          mkdir -p "$JNI_BUILD"

          cmake -S src/cpp -B "$JNI_BUILD" \
            -DCMAKE_BUILD_TYPE=Release \
            -DFREETYPE_INCLUDE_DIRS="${FREETYPE_DIR}/include" \
            -DFREETYPE_LIBRARIES="${FREETYPE_LIB}" \
            -DHARFBUZZ_INCLUDE_DIRS="${HARFBUZZ_DIR}/src" \
            -DHARFBUZZ_LIBRARIES="${HARFBUZZ_LIB}" \
            -DSTATIC_LINK_DEPS=ON
          cmake --build "$JNI_BUILD" --config Release

          DEST="$(pwd)/../../src/main/resources/natives/windows-x64"
          mkdir -p "$DEST"
          cp "$JNI_BUILD/Release/freetype_harfbuzz_jni.dll" "$DEST/" 2>/dev/null || \
          cp "$JNI_BUILD/freetype_harfbuzz_jni.dll" "$DEST/"
      - name: Verify output
        shell: bash
        run: ls -la freetype-harfbuzz-java-bindings/src/main/resources/natives/windows-x64/
      - uses: actions/upload-artifact@v4
        with:
          name: freetype-harfbuzz-windows-x64
          path: freetype-harfbuzz-java-bindings/src/main/resources/natives/windows-x64/

  freetype-harfbuzz-windows-x86:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
          architecture: 'x86'
      - name: Download and build dependencies (x86)
        shell: bash
        working-directory: freetype-harfbuzz-java-bindings/native/freetype-harfbuzz-jni
        run: |
          DEPS_DIR="$(pwd)/build/deps"
          mkdir -p "$DEPS_DIR"

          curl -L "https://download.savannah.gnu.org/releases/freetype/freetype-${FREETYPE_VERSION}.tar.xz" \
            -o "$DEPS_DIR/freetype.tar.xz"
          cd "$DEPS_DIR" && tar xf freetype.tar.xz && cd -

          curl -L "https://github.com/harfbuzz/harfbuzz/releases/download/${HARFBUZZ_VERSION}/harfbuzz-${HARFBUZZ_VERSION}.tar.xz" \
            -o "$DEPS_DIR/harfbuzz.tar.xz"
          cd "$DEPS_DIR" && tar xf harfbuzz.tar.xz && cd -

          FT_BUILD="$DEPS_DIR/freetype-build"
          mkdir -p "$FT_BUILD"
          cmake -S "$DEPS_DIR/freetype-${FREETYPE_VERSION}" -B "$FT_BUILD" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DBUILD_SHARED_LIBS=OFF \
            -DFT_DISABLE_BZIP2=ON \
            -DFT_DISABLE_PNG=ON \
            -DFT_DISABLE_HARFBUZZ=ON \
            -DFT_DISABLE_BROTLI=ON \
            -A Win32
          cmake --build "$FT_BUILD" --config Release

          FT_LIB=$(find "$FT_BUILD" -name "freetype.lib" -o -name "freetyped.lib" | head -1)
          echo "FreeType lib: $FT_LIB"

          HB_BUILD="$DEPS_DIR/harfbuzz-build"
          mkdir -p "$HB_BUILD"
          cmake -S "$DEPS_DIR/harfbuzz-${HARFBUZZ_VERSION}" -B "$HB_BUILD" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DBUILD_SHARED_LIBS=OFF \
            -DHB_HAVE_FREETYPE=ON \
            -DHB_HAVE_CORETEXT=OFF \
            -DHB_HAVE_GLIB=OFF \
            -DHB_HAVE_ICU=OFF \
            -DFREETYPE_INCLUDE_DIRS="$DEPS_DIR/freetype-${FREETYPE_VERSION}/include" \
            -DFREETYPE_LIBRARY="$FT_LIB" \
            -A Win32
          cmake --build "$HB_BUILD" --config Release

          HB_LIB=$(find "$HB_BUILD" -name "harfbuzz.lib" | head -1)
          echo "HarfBuzz lib: $HB_LIB"

          echo "FREETYPE_DIR=$DEPS_DIR/freetype-${FREETYPE_VERSION}" >> $GITHUB_ENV
          echo "FREETYPE_LIB=$FT_LIB" >> $GITHUB_ENV
          echo "HARFBUZZ_DIR=$DEPS_DIR/harfbuzz-${HARFBUZZ_VERSION}" >> $GITHUB_ENV
          echo "HARFBUZZ_LIB=$HB_LIB" >> $GITHUB_ENV

      - name: Build FreeType+HarfBuzz JNI (Windows x86)
        shell: bash
        working-directory: freetype-harfbuzz-java-bindings/native/freetype-harfbuzz-jni
        run: |
          JNI_BUILD="$(pwd)/build/jni-build"
          mkdir -p "$JNI_BUILD"

          cmake -S src/cpp -B "$JNI_BUILD" \
            -DCMAKE_BUILD_TYPE=Release \
            -DFREETYPE_INCLUDE_DIRS="${FREETYPE_DIR}/include" \
            -DFREETYPE_LIBRARIES="${FREETYPE_LIB}" \
            -DHARFBUZZ_INCLUDE_DIRS="${HARFBUZZ_DIR}/src" \
            -DHARFBUZZ_LIBRARIES="${HARFBUZZ_LIB}" \
            -DSTATIC_LINK_DEPS=ON \
            -A Win32
          cmake --build "$JNI_BUILD" --config Release

          DEST="$(pwd)/../../src/main/resources/natives/windows-x86"
          mkdir -p "$DEST"
          cp "$JNI_BUILD/Release/freetype_harfbuzz_jni.dll" "$DEST/" 2>/dev/null || \
          cp "$JNI_BUILD/freetype_harfbuzz_jni.dll" "$DEST/"
      - name: Verify output
        shell: bash
        run: ls -la freetype-harfbuzz-java-bindings/src/main/resources/natives/windows-x86/
      - uses: actions/upload-artifact@v4
        with:
          name: freetype-harfbuzz-windows-x86
          path: freetype-harfbuzz-java-bindings/src/main/resources/natives/windows-x86/

  # ============================================================
  #  Collect All Natives + Optional Commit
  # ============================================================
  collect-natives:
    needs:
      - msdfgen-linux-x64
      - msdfgen-macos-x64
      - msdfgen-macos-aarch64
      - msdfgen-windows-x64
      - msdfgen-windows-x86
      - freetype-harfbuzz-linux-x64
      - freetype-harfbuzz-macos-x64
      - freetype-harfbuzz-macos-aarch64
      - freetype-harfbuzz-windows-x64
      - freetype-harfbuzz-windows-x86
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: msdfgen-linux-x64
          path: msdfgen-java-bindings/src/main/resources/natives/linux-x64/
      - uses: actions/download-artifact@v4
        with:
          name: msdfgen-macos-x64
          path: msdfgen-java-bindings/src/main/resources/natives/macos-x64/
      - uses: actions/download-artifact@v4
        with:
          name: msdfgen-macos-aarch64
          path: msdfgen-java-bindings/src/main/resources/natives/macos-aarch64/
      - uses: actions/download-artifact@v4
        with:
          name: msdfgen-windows-x64
          path: msdfgen-java-bindings/src/main/resources/natives/windows-x64/
      - uses: actions/download-artifact@v4
        with:
          name: msdfgen-windows-x86
          path: msdfgen-java-bindings/src/main/resources/natives/windows-x86/

      - uses: actions/download-artifact@v4
        with:
          name: freetype-harfbuzz-linux-x64
          path: freetype-harfbuzz-java-bindings/src/main/resources/natives/linux-x64/
      - uses: actions/download-artifact@v4
        with:
          name: freetype-harfbuzz-macos-x64
          path: freetype-harfbuzz-java-bindings/src/main/resources/natives/macos-x64/
      - uses: actions/download-artifact@v4
        with:
          name: freetype-harfbuzz-macos-aarch64
          path: freetype-harfbuzz-java-bindings/src/main/resources/natives/macos-aarch64/
      - uses: actions/download-artifact@v4
        with:
          name: freetype-harfbuzz-windows-x64
          path: freetype-harfbuzz-java-bindings/src/main/resources/natives/windows-x64/
      - uses: actions/download-artifact@v4
        with:
          name: freetype-harfbuzz-windows-x86
          path: freetype-harfbuzz-java-bindings/src/main/resources/natives/windows-x86/

      - name: List all collected natives
        run: |
          echo "=== MSDFgen natives ==="
          find msdfgen-java-bindings/src/main/resources/natives -type f | sort
          echo ""
          echo "=== FreeType+HarfBuzz natives ==="
          find freetype-harfbuzz-java-bindings/src/main/resources/natives -type f | sort

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: all-natives
          path: |
            msdfgen-java-bindings/src/main/resources/natives/
            freetype-harfbuzz-java-bindings/src/main/resources/natives/

      - name: Commit natives to repository
        if: github.event.inputs.commit_natives == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add msdfgen-java-bindings/src/main/resources/natives/
          git add freetype-harfbuzz-java-bindings/src/main/resources/natives/

          if git diff --cached --quiet; then
            echo "No changes to native libraries."
          else
            git commit -m "ci: update native libraries for all platforms

          Built by GitHub Actions workflow.
          Platforms: linux-x64, macos-x64, macos-aarch64, windows-x64, windows-x86
          Libraries: msdfgen-jni, freetype_harfbuzz_jni"
            git push
          fi
